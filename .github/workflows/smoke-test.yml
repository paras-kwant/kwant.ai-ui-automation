name: Cypress Smoke Tests with Allure

on:
  workflow_dispatch:

jobs:
  smoke-tests:
    name: 🔥 Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
      TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      EXPECTED_FROM: ${{ secrets.EXPECTED_FROM }}
      TERM: xterm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: Run All Smoke Tests
        run: |
          mkdir -p allure-results
          npx cypress run \
            --spec "cypress/e2e/**/*.cy.js" \
            --browser chrome --headless \
            --env grepTags=@smoke \
            || echo "⚠️ Smoke tests finished with failures"

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-allure-results
          path: allure-results

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

  publish-report:
    name: 📊 Publish Allure Report
    needs: [smoke-tests]
    runs-on: ubuntu-latest
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: smoke-allure-results
          path: allure-results
        continue-on-error: true

      - name: Download Screenshots
        uses: actions/download-artifact@v4
        with:
          name: smoke-screenshots
          path: allure-results/screenshots
        continue-on-error: true

      - name: Set Environment Info
        run: |
          mkdir -p allure-results
          cat > allure-results/environment.properties << EOF
          Report.Type=🔥 Smoke Tests
          Environment=UAT
          Branch=${{ github.ref_name }}
          Run.Number=${{ github.run_number }}
          Triggered.By=${{ github.actor }}
          EOF
          cat > allure-results/executor.json << EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "🔥 Smoke Run #${{ github.run_number }}",
            "reportName": "🔥 Smoke Test Report"
          }
          EOF

      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report
          echo "✅ Allure report generated with $(find allure-report -type f | wc -l) files"

      - name: Deploy Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: ./allure-report
          destination_dir: smoke
          force_orphan: false
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Extract Allure Summary
        id: summary
        run: |
          SUMMARY="allure-report/widgets/summary.json"
          TOTAL=$(jq '.statistic.total' $SUMMARY)
          PASSED=$(jq '.statistic.passed' $SUMMARY)
          FAILED=$(jq '.statistic.failed' $SUMMARY)
          BROKEN=$(jq '.statistic.broken' $SUMMARY)
          SKIPPED=$(jq '.statistic.skipped' $SUMMARY)
          DURATION_MS=$(jq '.time.duration' $SUMMARY)

          if [ "$TOTAL" -gt 0 ]; then
            SUCCESS_RATE=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")
          else
            SUCCESS_RATE="0.00"
          fi

          MINUTES=$((DURATION_MS / 60000))
          SECONDS=$(((DURATION_MS % 60000) / 1000))
          TOTAL_TIME="${MINUTES}m ${SECONDS}s"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "broken=$BROKEN" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "success_rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT
          echo "total_time=$TOTAL_TIME" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: 💬 Send Slack Notification
        if: always()
        run: |
          PREVIEW_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/smoke/"
          TOTAL="${{ steps.summary.outputs.total }}"
          PASSED="${{ steps.summary.outputs.passed }}"
          FAILED="${{ steps.summary.outputs.failed }}"
          BROKEN="${{ steps.summary.outputs.broken }}"
          SKIPPED="${{ steps.summary.outputs.skipped }}"
          SUCCESS_RATE="${{ steps.summary.outputs.success_rate }}"
          TOTAL_TIME="${{ steps.summary.outputs.total_time }}"
          TIMESTAMP="${{ steps.summary.outputs.timestamp }}"

          TOTAL_FAILURES=$((FAILED + BROKEN))
          if [[ "$TOTAL" -eq 0 ]]; then
            STATUS="⚠️ Smoke tests did not run properly"
            COLOR="warning"
          elif [[ "$TOTAL_FAILURES" -eq 0 ]]; then
            STATUS="✅ Smoke tests completed successfully"
            COLOR="good"
          else
            STATUS="🚨 $TOTAL_FAILURES smoke tests failed out of $TOTAL tests"
            COLOR="danger"
          fi

          PAYLOAD=$(jq -n \
            --arg color "$COLOR" \
            --arg status "$STATUS" \
            --arg total "$TOTAL" \
            --arg passed "$PASSED" \
            --arg failed "$FAILED" \
            --arg broken "$BROKEN" \
            --arg skipped "$SKIPPED" \
            --arg success_rate "$SUCCESS_RATE%" \
            --arg total_time "$TOTAL_TIME" \
            --arg timestamp "$TIMESTAMP" \
            --arg preview_url "$PREVIEW_URL" \
            '{
              attachments: [
                {
                  color: $color,
                  title: $status,
                  fields: [
                    {title: "Total Tests", value: $total, short: true},
                    {title: "✅ Passed", value: $passed, short: true},
                    {title: "❌ Failed", value: $failed, short: true},
                    {title: "🟠 Broken", value: $broken, short: true},
                    {title: "⏭️ Skipped", value: $skipped, short: true},
                    {title: "📈 Success Rate", value: $success_rate, short: true},
                    {title: "⏱️ Duration", value: $total_time, short: true},
                    {title: "🕐 Last Checked", value: $timestamp, short: false}
                  ],
                  actions: [
                    {type: "button", text: "View Smoke Report", url: $preview_url}
                  ]
                }
              ]
            }')

          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
