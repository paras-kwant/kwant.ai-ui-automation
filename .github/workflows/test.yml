name: Debug Single Cypress Spec with Allure

on:
  workflow_dispatch:

jobs:
  single-spec-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
      TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      EXPECTED_FROM: ${{ secrets.EXPECTED_FROM }}
      TERM: xterm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # 🔍 Debug step to ensure file exists in CI
      - name: Verify Cypress spec exists
        run: ls -R cypress/e2e/companies

      # 🚀 Run ONLY single spec
      - name: Run ONLY download.cy.js
        run: |
          rm -rf allure-results allure-report
          mkdir -p allure-results
          npx cypress run --spec "cypress/e2e/companies/download.cy.js" --browser chrome --headless

      # 📊 Debug Allure output
      - name: Debug - Count Allure JSON Files
        run: |
          ls -l allure-results/*.json | wc -l