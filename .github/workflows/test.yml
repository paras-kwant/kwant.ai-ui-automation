name: Debug Single Cypress Spec with Allure

on:
  workflow_dispatch: # manual trigger only

jobs:
  single-spec-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
      TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      EXPECTED_FROM: ${{ secrets.EXPECTED_FROM }}
      TERM: xterm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Clean Allure results
        run: |
          rm -rf allure-results allure-report
          mkdir -p allure-results

      - name: Run ONLY workerStepper spec
        run: |
          npx cypress run \
            --spec "cypress/e2e/companies/workerStepper.cy.js" \
            --browser chrome \
            --headless

      - name: Debug - Count Allure JSON Files
        run: |
          ls -l allure-results/*.json | wc -l || echo "No allure results found"