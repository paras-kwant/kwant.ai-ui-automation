name: Debug Single Cypress Spec with Allure

on:
  workflow_dispatch:

jobs:
  single-spec-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
      TERM: xterm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Run ONLY document.cy.js
        run: |
          rm -rf allure-results allure-report
          mkdir -p allure-results
          npx cypress run \
            --spec "cypress/e2e/companies/document.cy.js" \
            --browser chrome --headless

      - name: Debug - Count Allure JSON Files
        run: |
          echo "JSON files generated:"
          find allure-results -name "*.json" | wc -l
          echo "Listing files:"
          ls -la allure-results

      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Deploy to Separate GitHub Page
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: ./allure-report
          publish_branch: gh-pages-single
          force_orphan: true