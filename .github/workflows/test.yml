name: Run Single Cypress Test Suite

on:
  workflow_dispatch:

jobs:
  single-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Single Cypress Test
        run: |
          echo "Running single Cypress test suite..."
          npx cypress run \
            --spec "cypress/e2e/companies/document.cy.js" \
            --env email=$EMAIL,password=$PASSWORD \
            --browser chrome \
            --headless